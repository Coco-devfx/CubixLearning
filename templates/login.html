<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubixLearning - Connexion</title>
    <link rel="stylesheet" href="../style/styles.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Même fond flou que le site principal */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('./beautiful-enjoying-nature-concept.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            filter: blur(5px);
            z-index: -1;
        }

        .login-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        /* En-tête identique au site */
        .login-header {
            background-color: rgba(149, 218, 194, 0.55);
            border: #353d3b 3px solid;
            border-radius: 25px;
            padding: 18px 30px;
            text-align: center;
            width: 100%;
        }

        .login-header h1 {
            font-style: italic;
            font-family: cursive;
            font-size: 2em;
            color: #ecf0f1;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        /* Carte de connexion */
        .login-card {
            background-color: rgba(236, 240, 241, 0.85);
            border: #95dac8 7px solid;
            border-radius: 25px;
            padding: 40px 36px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .login-card h2 {
            font-family: cursive;
            font-style: italic;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 28px;
            font-size: 1.5em;
        }

        .tabs {
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            border: #95dac8 3px solid;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: rgba(226, 229, 220, 0.5);
            font-family: cursive;
            font-size: 1em;
            color: #2c3e50;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .tab-btn.active {
            background-color: #95dac8;
            color: white;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .form-group input {
            padding: 12px 16px;
            border: #e2e5dc 6px solid;
            border-radius: 10px;
            font-size: 1em;
            background: rgba(255,255,255,0.8);
            color: #2c3e50;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #c472ae;
            box-shadow: 0 0 6px rgba(196, 114, 174, 0.4);
        }

        .submit-btn {
            margin-top: 8px;
            padding: 13px;
            background-color: #95dac8;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: cursive;
            font-style: italic;
            font-size: 1.15em;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12);
        }

        .submit-btn:hover {
            background-color: #c472ae;
            transform: translateY(-2px);
        }

        .feedback {
            text-align: center;
            font-size: 0.95em;
            min-height: 22px;
            color: #c472ae;
            font-style: italic;
        }

        .back-link {
            text-align: center;
            font-family: cursive;
        }

        .back-link a {
            color: #2c3e50;
            font-weight: bold;
            text-decoration: none;
            font-style: italic;
        }

        .back-link a:hover {
            color: #c472ae;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">

        <!-- En-tête -->
        <div class="login-header">
            <h1>CubixLearning</h1>
        </div>

        <!-- Carte principale -->
        <div class="login-card">
            <h2 id="cardTitle">Mon espace</h2>

            <!-- Onglets Connexion / Inscription -->
            <div class="tabs">
                <button class="tab-btn active" id="tabLogin" onclick="showTab('login')">Se connecter</button>
                <button class="tab-btn" id="tabRegister" onclick="showTab('register')">Créer un compte</button>
            </div>

            <!-- Formulaire Connexion -->
            <div id="loginForm">
                <div class="form-group">
                    <input type="text" id="loginName" placeholder="Votre nom d'utilisateur">
                    <button class="submit-btn" onclick="doLogin()">✅ Connexion</button>
                    <p class="feedback" id="loginFeedback"></p>
                </div>
            </div>

            <!-- Formulaire Inscription -->
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <input type="text" id="registerName" placeholder="Choisissez un nom d'utilisateur">
                    <button class="submit-btn" onclick="doRegister()">🌿 Créer mon compte</button>
                    <p class="feedback" id="registerFeedback"></p>
                </div>
            </div>
        </div>

        <!-- Retour accueil -->
        <div class="back-link">
            <a href="./main.html">← Retour à l'accueil</a>
        </div>

    </div>

    <script>
        // Affiche l'onglet choisi
        function showTab(tab) {
            document.getElementById('loginForm').style.display    = tab === 'login'    ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
        }

        // Connexion : vérifie qu'un nom existe en localStorage
        function doLogin() {
            const name = document.getElementById('loginName').value.trim();
            const feedback = document.getElementById('loginFeedback');
            if (!name) { feedback.textContent = 'Veuillez entrer votre nom.'; return; }

            const saved = localStorage.getItem('username');
            if (saved && saved.toLowerCase() === name.toLowerCase()) {
                feedback.style.color = '#2ecc71';
                feedback.textContent = 'Bienvenue, ' + saved + ' !';
                setTimeout(() => window.location.href = './main.html', 1000);
            } else {
                feedback.style.color = '#c472ae';
                feedback.textContent = 'Nom introuvable. Créez un compte d\'abord.';
            }
        }

        // Inscription : sauvegarde le nom en localStorage (compatible avec script_2.js)
        function doRegister() {
            const name = document.getElementById('registerName').value.trim();
            const feedback = document.getElementById('registerFeedback');
            if (!name) { feedback.textContent = 'Veuillez entrer un nom.'; return; }

            localStorage.setItem('username', name);
            feedback.style.color = '#2ecc71';
            feedback.textContent = 'Compte créé ! Redirection...';
            setTimeout(() => window.location.href = './main.html', 1200);
        }

        // Si déjà connecté, on le signale
        window.onload = function () {
            const user = localStorage.getItem('username');
            if (user) {
                document.getElementById('cardTitle').textContent = 'Bonjour, ' + user + ' !';
                document.getElementById('loginName').placeholder = user;
            }
        };
    </script>
</body>
</html>
